databases:
  - name: happytummy-db
    plan: free
    databaseName: happytummy
    user: happytummy

services:
  - type: web
    name: happytummy
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn happytummy.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: happytummy-db
          property: connectionString
      - key: SMS_BACKEND
        value: console
      - key: SERVE_MEDIA
        value: "true"
