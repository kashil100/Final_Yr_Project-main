{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}HappyTummy{% endblock %}</title>
    <script>
        (function () {
            var storageKey = "happyTummyTheme";
            var theme = "light";

            try {
                var storedTheme = localStorage.getItem(storageKey);
                var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                theme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : (systemDark ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
                document.documentElement.style.colorScheme = theme;
            } catch (error) {
                document.documentElement.dataset.theme = theme;
                document.documentElement.style.colorScheme = theme;
            }
        })();
    </script>
    <script>
        (function () {
            var chartValue;

            function token(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            }

            function configureCharts(Chart) {
                if (!Chart || !Chart.defaults) {
                    return;
                }

                Chart.defaults.color = token("--ht-text-muted");
                Chart.defaults.borderColor = token("--ht-border");
                Chart.defaults.backgroundColor = token("--ht-primary");

                if (Chart.defaults.plugins && Chart.defaults.plugins.legend && Chart.defaults.plugins.legend.labels) {
                    Chart.defaults.plugins.legend.labels.color = token("--ht-text");
                }

                if (Chart.instances) {
                    Object.keys(Chart.instances).forEach(function (key) {
                        var chart = Chart.instances[key];
                        if (chart && typeof chart.update === "function") {
                            chart.update("none");
                        }
                    });
                }
            }

            window.HappyTummyConfigureCharts = function () {
                configureCharts(window.Chart);
            };

            Object.defineProperty(window, "Chart", {
                configurable: true,
                get: function () {
                    return chartValue;
                },
                set: function (value) {
                    chartValue = value;
                    configureCharts(value);
                }
            });
        })();
    </script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="icon" href="{% static 'Assets/logo.png' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}
    <script>
        (function () {
            var storageKey = "happyTummyTheme";
            var root = document.documentElement;

            function applyTheme(theme) {
                var nextTheme = theme === "dark" ? "dark" : "light";
                root.dataset.theme = nextTheme;
                root.style.colorScheme = nextTheme;
                root.classList.toggle("dark-mode", nextTheme === "dark");
                if (document.body) {
                    document.body.classList.toggle("dark-mode", nextTheme === "dark");
                }

                document.querySelectorAll("[data-theme-toggle]").forEach(function (toggle) {
                    toggle.setAttribute("aria-pressed", String(nextTheme === "dark"));
                    toggle.setAttribute("aria-label", nextTheme === "dark" ? "Switch to light mode" : "Switch to dark mode");
                });

                if (typeof window.HappyTummyConfigureCharts === "function") {
                    window.HappyTummyConfigureCharts();
                }
            }

            function persistTheme(theme) {
                try {
                    localStorage.setItem(storageKey, theme);
                } catch (error) {
                    return;
                }
            }

            window.HappyTummyTheme = {
                get: function () {
                    return root.dataset.theme === "dark" ? "dark" : "light";
                },
                set: function (theme) {
                    applyTheme(theme);
                    persistTheme(root.dataset.theme);
                },
                toggle: function () {
                    this.set(this.get() === "dark" ? "light" : "dark");
                }
            };

            applyTheme(root.dataset.theme);

            document.addEventListener("click", function (event) {
                var toggle = event.target.closest("[data-theme-toggle]");
                if (toggle) {
                    window.HappyTummyTheme.toggle();
                }
            });

            window.addEventListener("storage", function (event) {
                if (event.key === storageKey && (event.newValue === "dark" || event.newValue === "light")) {
                    applyTheme(event.newValue);
                }
            });
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
